services:
  db:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  server:
    restart: always
    build:
      context: ./server
      dockerfile: Dockerfile.production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  client:
    restart: always
    build:
      context: ./client
      dockerfile: Dockerfile.production
    ports:
      - '80:80'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
