services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d planner']
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
  server:
    build: ./team/server
    ports:
      - '3000:3000'
    env_file: ./team/server/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./team/server/src:/app/src
  client:
    build: ./team/client
    ports:
      - '5173:5173'
    depends_on:
      - server
    volumes:
      - ./team/client/src:/app/src
volumes:
  pgdata:
