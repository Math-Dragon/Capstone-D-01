name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: planner_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/planner_test
      JWT_SECRET: test_jwt_secret_min_32_characters_long
      JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_long
      GEMINI_API_KEY: test_key
      LLM_PROVIDER: mock
      NODE_ENV: test
      REDIS_URL: redis://localhost:6379
    defaults:
      run:
        working-directory: ./team
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Secret scan
        working-directory: .
        run: |
          if grep -RInE 'AIza[0-9A-Za-z_-]{35}|(^|[^A-Za-z0-9_])sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{30,}|-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----' \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=coverage \
            --exclude='package-lock.json' \
            --exclude='*.md' \
            .; then
            echo "Potential secret detected"
            exit 1
          fi
      - run: cd server && npm ci
      - run: cd server && npm run migrate:up
      - run: cd server && npm run lint
      - run: cd server && npm test -- --coverage
      - name: Check server coverage
        working-directory: ./team/server
        run: |
          COVERAGE=$(node -e "
            const fs=require('fs');
            const r=JSON.parse(fs.readFileSync('coverage/coverage-final.json','utf8'));
            const keys=Object.keys(r);
            let total=0, covered=0;
            for (const k of keys) {
              const ids=Object.keys(r[k].s);
              const lines=new Set(), clines=new Set();
              for (const id of ids) {
                const loc=r[k].statementMap[id];
                if (loc) { const L=loc.start.line; lines.add(L); if(r[k].s[id]>0) clines.add(L); }
              }
              total+=lines.size; covered+=clines.size;
            }
            console.log((covered/total*100).toFixed(2));
          ")
          echo "Server line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then echo "Coverage below 50%"; exit 1; fi
      - run: cd client && npm ci
      - run: cd client && npm run lint
      - run: cd client && npm run test:coverage
      - name: Check client coverage
        working-directory: ./team/client
        run: |
          COVERAGE=$(node -e "
            const fs=require('fs');
            const r=JSON.parse(fs.readFileSync('coverage/coverage-final.json','utf8'));
            const keys=Object.keys(r);
            let total=0, covered=0;
            for (const k of keys) {
              const ids=Object.keys(r[k].s);
              const lines=new Set(), clines=new Set();
              for (const id of ids) {
                const loc=r[k].statementMap[id];
                if (loc) { const L=loc.start.line; lines.add(L); if(r[k].s[id]>0) clines.add(L); }
              }
              total+=lines.size; covered+=clines.size;
            }
            console.log((covered/total*100).toFixed(2));
          ")
          echo "Client line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then echo "Coverage below 50%"; exit 1; fi
